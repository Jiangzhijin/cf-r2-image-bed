<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云端相册 - R2 图床</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 简单动画和细节调整 */
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        [v-cloak] { display: none !important; } /* 防止 Vue 挂载前闪烁 */
        .drop-zone-active { border-color: #3b82f6; background-color: #eff6ff; }
    </style>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <div id="app" v-cloak class="min-h-screen flex flex-col">

        <div v-if="!isLoggedIn" class="flex-grow flex items-center justify-center p-4">
            <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md fade-in">
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-extrabold text-blue-600">云端相册</h1>
                    <p class="text-gray-500 mt-2">基于 Cloudflare R2 的私有图床</p>
                </div>
                <div class="space-y-4">
                    <input type="password" v-model="authSecret" placeholder="输入访问密钥" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-200 outline-none transition" @keyup.enter="login">
                    <button @click="login" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition duration-150 shadow">验证进入</button>
                    <p v-if="loginError" class="text-red-500 text-sm text-center mt-2">{{ loginError }}</p>
                </div>
            </div>
        </div>

        <div v-else class="fade-in">
            <header class="bg-white shadow-sm sticky top-0 z-50">
                <nav class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <span class="text-3xl">🏞️</span>
                        <h1 class="text-2xl font-bold text-gray-800">云端相册</h1>
                    </div>
                    <div class="flex items-center gap-4">
                        <button @click="openUploadModal" class="bg-blue-600 text-white px-5 py-2 rounded-lg font-medium hover:bg-blue-700 shadow-sm flex items-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                            上传图片
                        </button>
                        <button @click="logout" class="text-sm text-gray-500 hover:text-red-600">退出</button>
                    </div>
                </nav>
            </header>

            <main class="max-w-7xl mx-auto px-4 py-10 flex-grow">
                <div class="flex items-center justify-between mb-8">
                    <h2 class="text-xl font-semibold text-gray-700">图片列表 ({{ images.length }})</h2>
                    <button @click="fetchImages" class="text-gray-500 hover:text-blue-600">🔄 刷新</button>
                </div>

                <div v-if="loading" class="text-center py-20 text-gray-500">加载中...</div>
                <div v-else-if="images.length === 0" class="text-center py-20 bg-gray-100 rounded-2xl border-2 border-dashed border-gray-200 text-gray-500">
                    这里还空空如也，快去上传第一张图片吧！
                </div>
                <div v-else class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">
                    <div v-for="img in images" :key="img.key" class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden group">
                        <div class="relative aspect-square">
                            <img :src="getImageUrl(img.key)" class="w-full h-full object-cover transition-transform group-hover:scale-105" loading="lazy">
                        </div>
                        <div class="p-3">
                            <p class="text-xs text-gray-500 truncate mb-2">{{ img.key }}</p>
                            <div class="flex items-center gap-2">
                                <button @click="copyLink(img.key)" class="flex-grow text-xs bg-gray-100 text-gray-700 px-2 py-1 rounded hover:bg-blue-50">复制链接</button>
                                <button @click="deleteImage(img.key)" class="text-xs bg-red-50 text-red-600 px-2 py-1 rounded hover:bg-red-100">删除</button>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <div v-if="showUploadModal" class="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4" @click.self="closeUploadModal">
            <div class="bg-white rounded-2xl p-8 w-full max-w-xl shadow-2xl fade-in relative">
                <button @click="closeUploadModal" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">✕</button>
                <h3 class="text-2xl font-bold mb-6">上传图片</h3>
                
                <div 
                    id="dropZone"
                    class="border-4 border-dashed border-gray-200 rounded-2xl py-12 text-center transition cursor-pointer"
                    :class="{'drop-zone-active': isDragging}"
                    @dragover.prevent="onDragOver"
                    @dragleave.prevent="onDragLeave"
                    @drop.prevent="onDrop"
                    @click="triggerFileInput"
                >
                    <svg class="w-16 h-16 text-gray-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    <p class="text-gray-600 font-medium">拖拽图片到这里，或 <span class="text-blue-600">点击选择</span></p>
                    <p class="text-xs text-gray-400 mt-2">支持常见图片格式，最大 10MB</p>
                    <input type="file" ref="fileInput" multiple accept="image/*" class="hidden" @change="onFileSelected">
                </div>

                <div v-if="uploadQueue.length > 0" class="mt-6 space-y-2 max-h-40 overflow-y-auto">
                    <div v-for="file in uploadQueue" :key="file.name" class="flex items-center justify-between bg-gray-50 p-3 rounded-lg text-sm">
                        <span class="truncate max-w-[70%] text-gray-700">{{ file.name }}</span>
                        <span v-if="file.status === 'success'" class="text-green-600 font-medium">✅ 成功</span>
                        <span v-else-if="file.status === 'error'" class="text-red-600 font-medium">❌ 失败</span>
                        <span v-else class="text-blue-600 animate-pulse">上传中...</span>
                    </div>
                </div>
            </div>
        </div>

        <div v-if="toast" class="fixed bottom-4 right-4 bg-gray-800 text-white px-6 py-3 rounded-xl shadow-lg z-[200] fade-in">
            {{ toast }}
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
